<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>再次祝你生日快乐 🎉</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(145deg, #f9c5d1, #f2e6d8);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .final-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            max-width: 600px;
            width: 85%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            animation: fadeIn 1.5s;
        }
        h1 {
            font-size: 2.8em;
            color: #ff6f61;
        }
        p {
            font-size: 1.6em;
            color: #333;
            margin: 30px 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #aaa;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.2em;
            transition: 0.3s;
        }
        .back-link:hover {
            background: #888;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="final-card">
        <h1>🎈 再次祝你生日快乐！ 🎈</h1>
        <p>愿你的生活像耳机里的音乐一样动听，<br>像旅行水杯一样装满温暖与惊喜。</p>
        <p>🌟 永远开心，永远幸福 🌟</p>
        <!-- 可以添加更多个性化内容 -->
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>
</body>
</html>
